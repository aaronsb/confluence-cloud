# ADR Configuration — Confluence Cloud MCP Server
# Defines domain numbering and validation rules.
# Used by: docs/scripts/adr

project_name: Confluence Cloud MCP Server

# Domain Number Series
domains:
  core:
    range: [100, 199]
    name: Core
    description: Server architecture, content model, tool surface
    folder: core

  client:
    range: [200, 299]
    name: Client
    description: API transport (REST v2, GraphQL), auth, multi-tenancy
    folder: client

  content:
    range: [300, 399]
    name: Content
    description: ADF handling, macro blocks, editing sessions, round-trip fidelity
    folder: content

  navigation:
    range: [400, 499]
    name: Navigation
    description: Page hierarchy, link graph, search, progressive disclosure
    folder: navigation

  operations:
    range: [500, 599]
    name: Operations
    description: Batching, queuing, field discovery, rendering facades
    folder: operations

# Valid ADR statuses
statuses:
  - Draft
  - Proposed
  - Accepted
  - Superseded
  - Deprecated

# Default values for new ADRs
defaults:
  deciders: [aaronsb]
  status: Draft

# Legacy ADR range (pre-domain numbering)
legacy:
  range: [1, 99]
  label: "Legacy"

# Viewer command
viewer: cat {file}
